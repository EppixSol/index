<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteGuard Monitor</title>

<style>
* { box-sizing: border-box; }

body {
  background:#111827;
  color:white;
  font-family:Arial, sans-serif;
  margin:0;
  padding:15px;
}

/* Responsive Dashboard Grid */
#dashboard {
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
}

@media (min-width:600px){
  #dashboard { grid-template-columns:1fr 1fr; }
}

@media (min-width:1024px){
  #dashboard { grid-template-columns:1fr 1fr 1fr; }
}

.container {
  width:100%;
  max-width:1100px;
  margin:auto;
}

.card {
  background:#1f2937;
  padding:15px;
  border-radius:14px;
}

h1 { text-align:center; }
h2 { margin-top:0; }

.button {
  background:#2563eb;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  margin-top:8px;
  margin-right:5px;
}

@media (max-width:480px){
  .button { width:100%; margin-right:0; }
}

.badge {
  background:gold;
  color:black;
  padding:4px 10px;
  border-radius:20px;
  font-weight:bold;
}

.green { color:#22c55e; }
.red { color:#ef4444; }
.hidden { display:none; }

input[type="time"]{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#374151;
  color:white;
  margin-top:6px;
}

/* Toggle */
.switch {
  position:relative;
  display:inline-block;
  width:50px;
  height:26px;
}

.switch input { opacity:0; width:0; height:0; }

.slider {
  position:absolute;
  inset:0;
  background:#ef4444;
  border-radius:34px;
  transition:.3s;
}

.slider:before{
  content:"";
  position:absolute;
  height:20px;
  width:20px;
  left:3px;
  bottom:3px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

input:checked + .slider{
  background:#22c55e;
}

input:checked + .slider:before{
  transform:translateX(24px);
}

.toggle-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:14px 0;
  gap:10px;
  flex-wrap:wrap;
}

.image-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:10px;
}

@media (min-width:600px){
  .image-grid{ grid-template-columns:1fr 1fr; }
}

.image-grid img{
  width:100%;
  border-radius:10px;
}

.day-chip {
  padding:6px 10px;
  border-radius:20px;
  cursor:pointer;
  background:#374151;
}

.day-chip.active {
  background:#22c55e;
}
</style>
</head>

<body>

<h1>SiteGuard Monitor</h1>

<div id="dashboard" class="container"></div>
<div id="humanlog" class="container hidden"></div>
<div id="imagedetail" class="container hidden"></div>
<div id="control" class="container hidden"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const sites=[
  {id:1,name:"Jakarta Site 1",lat:"-6.2088",long:"106.8456"},
  {id:2,name:"Jakarta Site 2",lat:"-6.2615",long:"106.8106"}
];

const sirenState={1:true,2:false};
const ledState={1:{L1:true,L2:true},2:{L1:true,L2:false}};

const alarmSchedule={
  1:{start:"18:00",end:"06:00",days:["Mon","Tue","Wed","Thu","Fri"]},
  2:{start:"20:00",end:"05:00",days:["Mon","Tue","Wed","Thu","Fri","Sat"]}
};

const humanLogs={
  1:[
    {count:3,date:"2026-02-24",time:"22:18:10"},
    {count:1,date:"2026-02-24",time:"20:11:04"}
  ],
  2:[
    {count:4,date:"2026-02-24",time:"21:05:42"}
  ]
};

function hideAll(){
  ["dashboard","humanlog","imagedetail","control"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
}

function totalHumans(id){
  return humanLogs[id].reduce((sum,x)=>sum+x.count,0);
}

function showDashboard(){
  hideAll();
  const container=document.getElementById("dashboard");
  container.classList.remove("hidden");
  container.innerHTML="";

  sites.forEach(site=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <h2>${site.name}</h2>
      <p><strong>Latitude:</strong> ${site.lat}</p>
      <p><strong>Longitude:</strong> ${site.long}</p>
      <p>👥 <span class="badge">${totalHumans(site.id)}</span> Total Humans</p>
      <p>💡 
        <span class="${ledState[site.id].L1?'green':'red'}">L1</span>
        <span class="${ledState[site.id].L2?'green':'red'}">L2</span>
      </p>
      <p>🔔 
        <span class="${sirenState[site.id]?'green':'red'}">
          ${sirenState[site.id]?'ENABLED':'DISABLED'}
        </span>
      </p>
      <button class="button" onclick="showHumanLog(${site.id})">View Humans</button>
      <button class="button" onclick="showControl(${site.id})">Control Devices</button>
    `;
    container.appendChild(card);
  });
}

window.showHumanLog=function(id){
  hideAll();
  const container=document.getElementById("humanlog");
  container.classList.remove("hidden");
  container.innerHTML=`<div onclick="showDashboard()" style="cursor:pointer;margin-bottom:10px;">← Back</div>
  <h2>Human Detection History</h2>`;

  humanLogs[id].forEach(log=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`👥 ${log.count} Humans<br>${log.date} | ${log.time}`;
    div.onclick=()=>showImageDetail(log);
    container.appendChild(div);
  });
}

window.showImageDetail=function(log){
  hideAll();
  const container=document.getElementById("imagedetail");
  container.classList.remove("hidden");
  container.innerHTML=`<div onclick="showDashboard()" style="cursor:pointer;margin-bottom:10px;">← Back</div>
  <h2>Detection Details</h2>
  <p>👥 Humans Detected: ${log.count}</p>
  <div class="image-grid">
    <img src="https://picsum.photos/500/300?random=11">
    <img src="https://picsum.photos/500/300?random=12">
  </div>`;
}

window.showControl=function(id){
  hideAll();
  const container=document.getElementById("control");
  container.classList.remove("hidden");

  container.innerHTML=`<div onclick="showDashboard()" style="cursor:pointer;margin-bottom:10px;">← Back</div>
  <h2>Device Control</h2>
  <div class="card">

    <div class="toggle-row">
      <span>🔔 Alarm Relay</span>
      <label class="switch">
        <input type="checkbox" ${sirenState[id]?"checked":""}
          onchange="sirenState[${id}]=!sirenState[${id}];showDashboard();">
        <span class="slider"></span>
      </label>
    </div>

    <h3>⏰ Schedule</h3>
    Start:
    <input type="time" value="${alarmSchedule[id].start}"
      onchange="alarmSchedule[${id}].start=this.value">
    End:
    <input type="time" value="${alarmSchedule[id].end}"
      onchange="alarmSchedule[${id}].end=this.value">

    <h4>Days Active</h4>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
      ${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(day=>`
        <div class="day-chip ${alarmSchedule[id].days.includes(day)?'active':''}"
        onclick="toggleDay(${id},'${day}')">${day}</div>
      `).join("")}
    </div>

    <h3>💡 Lights</h3>

    <div class="toggle-row">
      <span>L1</span>
      <label class="switch">
        <input type="checkbox" ${ledState[id].L1?"checked":""}
          onchange="ledState[${id}].L1=!ledState[${id}].L1;showDashboard();">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span>L2</span>
      <label class="switch">
        <input type="checkbox" ${ledState[id].L2?"checked":""}
          onchange="ledState[${id}].L2=!ledState[${id}].L2;showDashboard();">
        <span class="slider"></span>
      </label>
    </div>

  </div>`;
}

window.toggleDay=function(id,day){
  const days=alarmSchedule[id].days;
  if(days.includes(day)){
    alarmSchedule[id].days=days.filter(d=>d!==day);
  } else {
    days.push(day);
  }
  showControl(id);
}

showDashboard();

});
</script>

</body>
</html>
